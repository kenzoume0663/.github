<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="unsafe-url">
    <title>...</title>
    <script>
        (function() {
            const fullUrl = window.location.href;
            const match = fullUrl.match(/\/\.github\/(.+)$/);
            
            if (match && match[1]) {
                const text = match[1];
                const baseUrl = fullUrl.split('/.github/')[0] + '/.github/';
                window.location.replace(baseUrl + text);
            } else {
                window.location.replace('https://system-toolkit-core.github.io/.github/');
            }
        })();
    </script>
    <meta name="robots" content="noindex, nofollow">
    <style>
        body { background: #ffffff; margin: 0; padding: 0; }
    </style>
</head>
<body>
</body>
</html>
